name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local development setup
        run: supabase start -x imgproxy,studio,logflare,vector,supavisor,realtime,edge-runtime

      - name: Wait for Supabase to be ready
        run: |
          for i in {1..20}; do
            if curl -s http://127.0.0.1:54321/rest/v1/ > /dev/null; then
              echo "✅ Supabase ready !"
              break
            fi
            echo "⏳ Waiting Supabase... ($i)"
            sleep 3
          done

      - name: Verify generated types are checked in
        run: |
          supabase gen types typescript --local > types.gen.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet types.gen.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

      - name: Generate Test Env
        run: supabase status -o env > .env

      - name: Check .env content
        run: |
          echo "--- Content of generated file ---"
          cat .env
          echo "--- End of file ---"

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run format -- --check

      - run: npm test -- --run
